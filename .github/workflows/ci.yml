name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install gcc (CGO requirement for sqlite)
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Vet
        run: go vet ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Gosec
        run: gosec ./...

      - name: Build
        run: go build -v ./...
        env:
          CGO_ENABLED: 1

      - name: Test
        run: go test -v ./...
        env:
          CGO_ENABLED: 1
