version: '3.8'

services:
  proxy:
    image: golang:1.22-alpine
    container_name: shadowschema-proxy
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "38080:38080" # MITM Proxy
      - "38081:38081" # Export API
    command: go run main.go
    environment:
      - CGO_ENABLED=1 # sqlite3 requires cgo
    # Note: Alpine needs gcc/musl-dev for sqlite3
    entrypoint: >
      sh -c "apk add --no-cache gcc musl-dev && go run main.go"

  dashboard:
    image: node:20-alpine
    container_name: shadowschema-dashboard
    working_dir: /app/dashboard
    volumes:
      - ./dashboard:/app/dashboard
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - proxy
