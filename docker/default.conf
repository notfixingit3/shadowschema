# Local Docker Compose — dashboard at http://localhost:8080 with same-origin export API.

upstream shadowschema_dashboard {
    server dashboard:8080;
    keepalive 8;
}

upstream shadowschema_export {
    server proxy:38081;
    keepalive 8;
}

server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    client_max_body_size 50m;

    location ~ ^/(export-map|vault|discovered|generate-sdk|sessions|ca-cert|health|endpoints|export-replay)(/|$) {
        proxy_pass http://shadowschema_export;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://shadowschema_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}